name: Update Prices from Awin

on:
  # Roda automaticamente todo dia às 06:00 UTC (07:00 UK horário de verão)
  schedule:
    - cron: "0 6 * * *"

  # Permite rodar manualmente pelo GitHub clicando em "Run workflow"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Necessário para o passo de commit/push: sem isso o GITHUB_TOKEN é
    # somente-leitura e o push falha com 403 (visto no run 28574938591)
    permissions:
      contents: write

    steps:
      # 1. Baixa o repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Roda o script que baixa os feeds e gera o HTML
      - name: Build site with latest prices
        env:
          AWIN_API_TOKEN:    ${{ secrets.AWIN_API_TOKEN }}
          AWIN_PUBLISHER_ID: ${{ secrets.AWIN_PUBLISHER_ID }}
        run: python scripts/build_site.py

      # 4. Publica os feeds brutos como artifact (para diagnóstico de cobertura
      #    local — baixar em Actions → run → Artifacts, retenção 5 dias)
      - name: Upload raw feeds as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: awin-feeds
          path: feeds/
          retention-days: 5
          if-no-files-found: warn

      # 5. Commita o index.html atualizado de volta ao repositório
      - name: Commit updated index.html
        run: |
          git config user.name  "Maggie Bot"
          git config user.email "hello@maggiesearch.co.uk"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
